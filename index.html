<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map Highlighter</title>
<style>
    body {
        background: #111;
        color: white;
        font-family: Arial;
        text-align: center;
    }

    canvas {
        border: 1px solid #444;
        margin-top: 10px;
    }

    button {
        margin: 5px;
        padding: 10px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Map Highlighter</h2>

<div><button onclick="highlightOverlay([255,0,255])">Pink Region</button>
	<button onclick="highlightOverlay([255,255,0])">Yellow Region</button>
	<button onclick="highlightOverlay([0,255,0])">Green Region</button>
	<button onclick="resetMap()">Reset</button>
</div>

<canvas id="canvas"></canvas>

<script src="script.js"></script>

</body>
</html>
