<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map Highlighter</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
}

/* layout */
.container {
    display: flex;
    height: 100vh;
}

/* sidebar */
.controls {
    width: 260px;
    padding: 10px;
    border-right: 1px solid #444;
    overflow-y: auto;
}

.controls button {
    display: block;
    width: 100%;
    margin-bottom: 8px;
    padding: 10px;
    cursor: pointer;
}

.controls button:hover {
    background: #bababa;
}

/* map area */
.map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
}

/* canvas fills ONLY map-container */
canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: black;
    image-rendering: pixelated;
}

#zoomDisplay {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 14px;
    pointer-events: none;
}
</style>
</head>
<body>

<div class="container">

    <div class="controls">
		<button class="path-btn" onclick="togglePath(this)">Toggle Path</button>
		<br/>
		<div style="overflow-y: scroll; height:85%;">
			<button class="region-btn" onclick="toggleColor([61,147,134], this)">Okay Donuts + Tiny Pawb</button>
			<button class="region-btn" onclick="toggleColor([255,0,0], this)">MisterMaker_71</button>
			<button class="region-btn" onclick="toggleColor([239,0,255], this)">DVal</button>
			<button class="region-btn" onclick="toggleColor([78,51,197], this)">Malachi Derg</button>
			<button class="region-btn" onclick="toggleColor([255,255,0], this)">Windyote + Marty</button>
			<button class="region-btn" onclick="toggleColor([0,0,0], this)">Zinakiko</button>
			<button class="region-btn" onclick="toggleColor([0,27,255], this)">Tbear</button>
			<button class="region-btn" onclick="toggleColor([68,148,128], this)">DroxianV</button>
			<button class="region-btn" onclick="toggleColor([0,255,117], this)">???</button>
			<button class="region-btn" onclick="toggleColor([158,205,118], this)">Sneb</button>
			<button class="region-btn" onclick="toggleColor([63,182,122], this)">MagnuWah</button>
			<button class="region-btn" onclick="toggleColor([16,255,0], this)">fzysqrl</button>
			<button class="region-btn" onclick="toggleColor([255,69,0], this)">Jax</button>
			<button class="region-btn" onclick="toggleColor([134,63,200], this)">a Muffin</button>
			<button class="region-btn" onclick="toggleColor([63,200,120], this)">Tiger</button>
		</div>
    </div>

    <div class="map-container">
	<div id="zoomDisplay">Zoom: 100%</div>
        <canvas id="canvas"></canvas>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
